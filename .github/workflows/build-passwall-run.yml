name: Build PassWall .run from SourceForge

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if current PassWall version is already built"
        required: false
        default: "false"
  schedule:
    - cron: '17 19 * * *'

permissions:
  contents: write

env:
  OPENWRT_VERSION: "24.10"

jobs:
  check-update:
    runs-on: ubuntu-22.04
    outputs:
      build_needed: ${{ steps.check.outputs.build_needed }}
      passwall_version: ${{ steps.check.outputs.passwall_version }}
      release_tag: ${{ steps.check.outputs.release_tag }}
      asset_version: ${{ steps.check.outputs.asset_version }}
    steps:
      - name: Check latest PassWall version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          set -euo pipefail

          PASSWALL_VERSION="$(gh api repos/Openwrt-Passwall/openwrt-passwall/releases/latest --jq '.tag_name')"
          RELEASE_TAG="build-${PASSWALL_VERSION}"

          # GitHub release tag: 26.4.15-1
          # Asset version:     26.4.15-r1
          BASE_VER="${PASSWALL_VERSION%-*}"
          REL_NO="${PASSWALL_VERSION##*-}"
          ASSET_VERSION="${BASE_VER}-r${REL_NO}"

          BUILD_NEEDED="true"
          if [ "${FORCE_BUILD}" != "true" ]; then
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
              BUILD_NEEDED="false"
            fi
          fi

          echo "passwall_version=${PASSWALL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "asset_version=${ASSET_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_needed=${BUILD_NEEDED}" >> "$GITHUB_OUTPUT"

  build:
    needs: check-update
    if: needs.check-update.outputs.build_needed == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_label: x86_64
            sf_arch: x86_64
          - arch_label: aarch64_generic
            sf_arch: aarch64_generic

    env:
      PASSWALL_VERSION: ${{ needs.check-update.outputs.passwall_version }}
      ASSET_VERSION: ${{ needs.check-update.outputs.asset_version }}

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl wget jq gzip makeself gh ca-certificates

      - name: Prepare output directories
        run: |
          set -euo pipefail
          mkdir -p output/ipk output/run tmp

      - name: Download SourceForge package index
        run: |
          set -euo pipefail

          BASE_URL="https://sourceforge.net/projects/openwrt-passwall-build/files/releases/packages-${OPENWRT_VERSION}/${{ matrix.sf_arch }}/passwall_packages"
          INDEX_URL="${BASE_URL}/Packages.gz/download"

          curl -L --fail --retry 5 --retry-delay 3 \
            -o tmp/Packages.gz "${INDEX_URL}"

          gunzip -c tmp/Packages.gz > tmp/Packages

      - name: Download prebuilt dependency ipks from SourceForge
        run: |
          set -euo pipefail

          BASE_URL="https://sourceforge.net/projects/openwrt-passwall-build/files/releases/packages-${OPENWRT_VERSION}/${{ matrix.sf_arch }}/passwall_packages"

          # 这里放你要塞进 .run 的预编译依赖
          PKGS=(
            chinadns-ng
            dns2socks
            geoview
            hysteria
            ipt2socks
            microsocks
            naiveproxy
            shadow-tls
            shadowsocks-rust-sslocal
            shadowsocks-rust-ssserver
            shadowsocksr-libev-ssr-local
            shadowsocksr-libev-ssr-redir
            simple-obfs-client
            tcping
            trojan-plus
            tuic-client
            v2ray-geoip
            v2ray-geosite
            v2ray-plugin
            xray-core
            xray-plugin
            sing-box
          )

          awk_get_filename() {
            local pkg="$1"
            awk -v pkg="$pkg" '
              BEGIN { RS=""; FS="\n" }
              {
                p=""; f=""
                for (i=1; i<=NF; i++) {
                  if ($i ~ /^Package: /)  p=substr($i, 10)
                  if ($i ~ /^Filename: /) f=substr($i, 11)
                }
                if (p == pkg && f != "") {
                  print f
                  exit
                }
              }
            ' tmp/Packages
          }

          for pkg in "${PKGS[@]}"; do
            filename="$(awk_get_filename "$pkg" || true)"
            if [ -z "${filename:-}" ]; then
              echo "ERROR: package not found in Packages index: $pkg"
              exit 1
            fi

            echo "Downloading $filename"
            curl -L --fail --retry 5 --retry-delay 3 \
              -o "output/ipk/$(basename "$filename")" \
              "${BASE_URL}/$(basename "$filename")/download"
          done

      - name: Download LuCI main package and zh-cn language package from GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release download "${PASSWALL_VERSION}" \
            --repo Openwrt-Passwall/openwrt-passwall \
            --pattern "23.05-24.10_luci-app-passwall_${ASSET_VERSION}_all.ipk" \
            --dir output/ipk

          gh release download "${PASSWALL_VERSION}" \
            --repo Openwrt-Passwall/openwrt-passwall \
            --pattern "23.05-24.10_luci-i18n-passwall-zh-cn_${ASSET_VERSION}_all.ipk" \
            --dir output/ipk

      - name: Show downloaded files
        run: |
          ls -lah output/ipk

      - name: Make .run package
        run: |
          set -euo pipefail
          chmod +x scripts/install.sh scripts/make-run.sh

          bash scripts/make-run.sh \
            "passwall-full" \
            "${OPENWRT_VERSION}" \
            "${{ matrix.arch_label }}" \
            "${PASSWALL_VERSION}" \
            "${GITHUB_WORKSPACE}/output/ipk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwall-${{ matrix.arch_label }}
          path: output/run/*.run

  release:
    needs:
      - check-update
      - build
    if: needs.check-update.outputs.build_needed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show files
        run: |
          find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-update.outputs.release_tag }}
          name: PassWall ${{ needs.check-update.outputs.passwall_version }}
          files: dist/**/*.run
