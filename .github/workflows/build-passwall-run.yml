name: Build PassWall .run

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if current PassWall version is already built"
        required: false
        default: "false"
  schedule:
    - cron: '17 19 * * *'

permissions:
  contents: write

env:
  OPENWRT_VERSION: "24.10.6"

jobs:
  check-update:
    runs-on: ubuntu-22.04
    outputs:
      build_needed: ${{ steps.check.outputs.build_needed }}
      passwall_version: ${{ steps.check.outputs.passwall_version }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - name: Check latest PassWall version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          set -e

          PASSWALL_VERSION="$(gh api repos/Openwrt-Passwall/openwrt-passwall/releases/latest --jq '.tag_name')"
          RELEASE_TAG="build-${PASSWALL_VERSION}"

          echo "Latest PassWall version: ${PASSWALL_VERSION}"
          echo "Release tag to use: ${RELEASE_TAG}"

          BUILD_NEEDED="true"

          if [ "${FORCE_BUILD}" != "true" ]; then
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
              echo "This version is already built in current repo: ${RELEASE_TAG}"
              BUILD_NEEDED="false"
            fi
          fi

          echo "passwall_version=${PASSWALL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_needed=${BUILD_NEEDED}" >> "$GITHUB_OUTPUT"

  build:
    needs: check-update
    if: needs.check-update.outputs.build_needed == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            target: x86
            subtarget: 64
            sdk_arch_suffix: gcc-13.3.0_musl
            arch_label: x86_64
            extra_packages: >-
              luci-compat
              luci-base
              luci-lib-base
              luci-lib-ip
              luci-lib-jsonc
              luci-lib-nixio
              dns2socks
              microsocks
              ipt2socks
              chinadns-ng
              tcping
              geoview
              xray-core
              sing-box
              hysteria
              tuic-client
              trojan-plus
              shadowsocks-rust-sslocal
              shadowsocks-rust-ssserver
              shadowsocksr-libev-ssr-local
              shadowsocksr-libev-ssr-redir
              shadowsocks-libev-ss-local
              shadowsocks-libev-ss-redir
              simple-obfs
              v2ray-plugin
              xray-plugin
              shadow-tls
              naiveproxy
              haproxy

          - name: aarch64_generic
            target: rockchip
            subtarget: armv8
            sdk_arch_suffix: gcc-13.3.0_musl
            arch_label: aarch64_generic
            extra_packages: >-
              chinadns-ng
              dns2socks
              geoview
              ipt2socks
              microsocks
              naiveproxy
              shadow-tls
              shadowsocks-rust-sslocal
              shadowsocks-rust-ssserver
              shadowsocksr-libev-ssr-local
              shadowsocksr-libev-ssr-redir
              shadowsocksr-libev-ssr-server
              simple-obfs
              tcping
              trojan-plus
              tuic-client
              v2ray-geoip
              v2ray-geosite
              v2ray-plugin
              xray-core
              xray-plugin
              sing-box

    env:
      PASSWALL_VERSION: ${{ needs.check-update.outputs.passwall_version }}
      MAIN_PACKAGES: >-
        luci-app-passwall

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            fastjar flex gawk gettext gcc-multilib g++-multilib git gperf \
            haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool \
            lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 \
            python3-distutils python3-pip python3-ply python3-docutils qemu-utils \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs unzip \
            upx-ucl vim wget xmlto xxd zlib1g-dev zstd makeself jq file ca-certificates gh

      - name: Prepare SDK variables
        id: vars
        shell: bash
        run: |
          set -e
          SDK_FILE="openwrt-sdk-${OPENWRT_VERSION}-${{ matrix.target }}-${{ matrix.subtarget }}_${{ matrix.sdk_arch_suffix }}.Linux-x86_64.tar.zst"
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/${SDK_FILE}"

          echo "sdk_file=${SDK_FILE}" >> "$GITHUB_OUTPUT"
          echo "sdk_url=${SDK_URL}" >> "$GITHUB_OUTPUT"

      - name: Download SDK
        run: |
          set -e
          echo "Downloading SDK: ${{ steps.vars.outputs.sdk_url }}"
          wget -O "${{ steps.vars.outputs.sdk_file }}" "${{ steps.vars.outputs.sdk_url }}"

      - name: Extract SDK
        shell: bash
        run: |
          set -e
          tar --zstd -xf "${{ steps.vars.outputs.sdk_file }}"
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n 1)"
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Update feeds and clone PassWall sources
        working-directory: ${{ env.SDK_DIR }}
        shell: bash
        run: |
          set -e

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          rm -rf feeds/packages/net/{xray-core,v2ray-geodata,sing-box,chinadns-ng,dns2socks,hysteria,ipt2socks,microsocks,naiveproxy,shadowsocks-libev,shadowsocks-rust,shadowsocksr-libev,simple-obfs,simple-obfs-client,tcping,trojan-plus,tuic-client,v2ray-plugin,xray-plugin,geoview,shadow-tls} || true
          rm -rf feeds/luci/applications/luci-app-passwall || true

          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/passwall-packages
          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall.git package/passwall-luci

      - name: Generate .config
        working-directory: ${{ env.SDK_DIR }}
        shell: bash
        run: |
          set -e

          cat > .config <<'EOF'
          CONFIG_ALL_NONSHARED=y
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=y
          EOF

          for p in $MAIN_PACKAGES ${{ matrix.extra_packages }}; do
            echo "CONFIG_PACKAGE_${p}=m" >> .config
          done

          make defconfig

          echo "===== Selected packages ====="
          grep '^CONFIG_PACKAGE_.*=m' .config | sort || true

      - name: Build packages
        working-directory: ${{ env.SDK_DIR }}
        shell: bash
        run: |
          set -e

          PKGS="$MAIN_PACKAGES ${{ matrix.extra_packages }}"
          FAILED_PKGS=""

          for p in $PKGS; do
            echo "===== Building package/$p ====="
            if ! make "package/$p/compile" V=s -j"$(nproc)"; then
              echo "Parallel build failed for $p, retrying with -j1..."
              if ! make "package/$p/compile" V=s -j1; then
                echo "FAILED: $p"
                FAILED_PKGS="$FAILED_PKGS $p"
              fi
            fi
          done

          if [ -n "$FAILED_PKGS" ]; then
            echo "The following packages failed:$FAILED_PKGS"
            exit 1
          fi

      - name: Collect built IPKs
        working-directory: ${{ env.SDK_DIR }}
        shell: bash
        run: |
          set -e
          mkdir -p "${GITHUB_WORKSPACE}/output/ipk"
          mkdir -p "${GITHUB_WORKSPACE}/output/logs"

          if [ ! -d "bin" ]; then
            echo "ERROR: build output directory 'bin' does not exist"
            exit 1
          fi

          find bin -type f -name "*.ipk" | sort > "${GITHUB_WORKSPACE}/output/logs/all-ipk-list-${{ matrix.arch_label }}.txt" || true

          if [ ! -s "${GITHUB_WORKSPACE}/output/logs/all-ipk-list-${{ matrix.arch_label }}.txt" ]; then
            echo "ERROR: no ipk files were generated"
            find bin -maxdepth 3 -type d | sort || true
            exit 1
          fi

          find bin -type f -name "*.ipk" -exec cp -fv {} "${GITHUB_WORKSPACE}/output/ipk/" \;

          ls -lah "${GITHUB_WORKSPACE}/output/ipk" | tee "${GITHUB_WORKSPACE}/output/logs/collected-ipks-${{ matrix.arch_label }}.txt"

      - name: Make .run package
        shell: bash
        run: |
          set -e
          chmod +x scripts/install.sh scripts/make-run.sh

          bash scripts/make-run.sh \
            "passwall-full" \
            "${OPENWRT_VERSION}" \
            "${{ matrix.arch_label }}" \
            "${PASSWALL_VERSION}" \
            "${GITHUB_WORKSPACE}/output/ipk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwall-${{ matrix.arch_label }}
          path: |
            output/run/*.run
            output/logs/*

  release:
    needs:
      - check-update
      - build
    if: needs.check-update.outputs.build_needed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show files
        run: |
          find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-update.outputs.release_tag }}
          name: PassWall ${{ needs.check-update.outputs.passwall_version }}
          files: dist/**/*.run
