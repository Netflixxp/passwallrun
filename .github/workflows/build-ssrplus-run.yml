name: Build SSR Plus .run from prebuilt IPKs

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if current SSR Plus version is already built"
        required: false
        default: "false"
  schedule:
    - cron: '37 19 * * *'

permissions:
  contents: write

env:
  OPENWRT_VERSION: "24.10"

jobs:
  check-update:
    runs-on: ubuntu-22.04
    outputs:
      build_needed: ${{ steps.check.outputs.build_needed }}
      ssrplus_version: ${{ steps.check.outputs.ssrplus_version }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - name: Check latest helloworld commit
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          set -euo pipefail

          SSRPLUS_VERSION="$(gh api repos/fw876/helloworld/commits/master --jq '.sha' | cut -c1-7)"
          RELEASE_TAG="build-ssrplus-${SSRPLUS_VERSION}"

          BUILD_NEEDED="true"
          if [ "${FORCE_BUILD}" != "true" ]; then
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
              BUILD_NEEDED="false"
            fi
          fi

          echo "ssrplus_version=${SSRPLUS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_needed=${BUILD_NEEDED}" >> "$GITHUB_OUTPUT"

  build:
    needs: check-update
    if: needs.check-update.outputs.build_needed == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_label: x86_64
            base_url: "https://dl.openwrt.ai/packages-24.10/x86_64"
          - arch_label: aarch64_generic
            base_url: "https://dl.openwrt.ai/packages-24.10/aarch64_generic"

    env:
      SSRPLUS_VERSION: ${{ needs.check-update.outputs.ssrplus_version }}

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl wget jq gzip makeself gh ca-certificates

      - name: Prepare directories
        run: |
          set -euo pipefail
          rm -rf output tmp
          mkdir -p output/ipk output/run tmp

      - name: Download package indexes
        run: |
          set -euo pipefail

          download_with_retry() {
            local url="$1"
            local out="$2"
            curl -L --fail --retry 5 --retry-delay 3 --connect-timeout 20 \
              -o "$out" "$url"
          }

          download_with_retry "${{ matrix.base_url }}/kiddin9/Packages.gz" "tmp/Kiddin9-Packages.gz"
          gunzip -c tmp/Kiddin9-Packages.gz > tmp/Kiddin9-Packages

          download_with_retry "${{ matrix.base_url }}/packages/Packages.gz" "tmp/Packages-Packages.gz"
          gunzip -c tmp/Packages-Packages.gz > tmp/Packages-Packages

          download_with_retry "${{ matrix.base_url }}/base/Packages.gz" "tmp/Base-Packages.gz"
          gunzip -c tmp/Base-Packages.gz > tmp/Base-Packages

      - name: Save indexes
        uses: actions/upload-artifact@v4
        with:
          name: ssrplus-indexes-${{ matrix.arch_label }}
          path: |
            tmp/Kiddin9-Packages
            tmp/Packages-Packages
            tmp/Base-Packages

      - name: Download SSR Plus and dependencies
        run: |
          set -euo pipefail

          K_BASE="${{ matrix.base_url }}/kiddin9"
          P_BASE="${{ matrix.base_url }}/packages"
          B_BASE="${{ matrix.base_url }}/base"

          get_filename() {
            local pkg="$1"
            local index="$2"
            awk -v pkg="$pkg" '
              BEGIN { RS=""; FS="\n" }
              {
                p=""; f=""
                for (i=1; i<=NF; i++) {
                  if ($i ~ /^Package: /) p=substr($i, 10)
                  if ($i ~ /^Filename: /) f=substr($i, 11)
                }
                if (p == pkg && f != "") {
                  print f
                  exit
                }
              }
            ' "$index"
          }

          download_with_retry() {
            local url="$1"
            local out="$2"
            curl -L --fail --retry 5 --retry-delay 3 --connect-timeout 20 \
              -o "$out" "$url"
          }

          # kiddin9 里的主要包
          K_PKGS=(
            luci-app-ssr-plus
            dns2socks
            microsocks
            ipt2socks
            chinadns-ng
            tcping
            xray-core
            v2ray-plugin
            xray-plugin
            shadowsocks-rust-sslocal
            shadowsocks-rust-ssserver
            shadowsocksr-libev-ssr-local
            shadowsocksr-libev-ssr-redir
            simple-obfs-client
            naiveproxy
            shadow-tls
            trojan-plus
            tuic-client
            hysteria
          )

          for pkg in "${K_PKGS[@]}"; do
            filename="$(get_filename "$pkg" tmp/Kiddin9-Packages || true)"
            if [ -z "${filename:-}" ]; then
              echo "ERROR: package not found in kiddin9 index: $pkg"
              exit 1
            fi
            echo "Downloading $filename"
            download_with_retry "${K_BASE}/$(basename "$filename")" "output/ipk/$(basename "$filename")"
          done

          # packages 源补 libudns
          for pkg in libudns; do
            filename="$(get_filename "$pkg" tmp/Packages-Packages || true)"
            if [ -z "${filename:-}" ]; then
              echo "ERROR: package not found in packages index: $pkg"
              exit 1
            fi
            echo "Downloading $filename"
            download_with_retry "${P_BASE}/$(basename "$filename")" "output/ipk/$(basename "$filename")"
          done

          # base 源补 libopenssl3
          for pkg in libopenssl3; do
            filename="$(get_filename "$pkg" tmp/Base-Packages || true)"
            if [ -z "${filename:-}" ]; then
              echo "ERROR: package not found in base index: $pkg"
              exit 1
            fi
            echo "Downloading $filename"
            download_with_retry "${B_BASE}/$(basename "$filename")" "output/ipk/$(basename "$filename")"
          done

      - name: Verify required packages
        run: |
          set -euo pipefail

          required_patterns=(
            "luci-app-ssr-plus_*.ipk"
            "xray-core_*.ipk"
            "chinadns-ng_*.ipk"
            "dns2socks_*.ipk"
            "microsocks_*.ipk"
            "ipt2socks_*.ipk"
            "libudns_*.ipk"
            "libopenssl3_*.ipk"
          )

          for pattern in "${required_patterns[@]}"; do
            if ! compgen -G "output/ipk/${pattern}" > /dev/null; then
              echo "ERROR: required package missing: ${pattern}"
              ls -lah output/ipk || true
              exit 1
            fi
          done

      - name: Show downloaded files
        run: |
          ls -lah output/ipk

      - name: Make .run package
        run: |
          set -euo pipefail
          chmod +x scripts/install.sh scripts/make-run.sh

          bash scripts/make-run.sh \
            "ssrplus-full" \
            "${OPENWRT_VERSION}" \
            "${{ matrix.arch_label }}" \
            "${SSRPLUS_VERSION}" \
            "${GITHUB_WORKSPACE}/output/ipk"

      - name: Verify run package exists
        run: |
          set -euo pipefail
          compgen -G "output/run/*.run" > /dev/null || {
            echo "ERROR: no .run file generated"
            exit 1
          }
          ls -lah output/run

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssrplus-${{ matrix.arch_label }}
          path: output/run/*.run

  release:
    needs:
      - check-update
      - build
    if: needs.check-update.outputs.build_needed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show files
        run: |
          find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-update.outputs.release_tag }}
          name: SSR Plus ${{ needs.check-update.outputs.ssrplus_version }} for OpenWrt ${{ env.OPENWRT_VERSION }}
          files: dist/**/*.run
