name: Build SSR Plus .run

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: "包版本目录"
        required: false
        default: "packages-24.10"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directories and set PACKAGE_VERSION
        run: |
          set -euo pipefail

          mkdir -p x86_64/depends aarch64_generic/depends

          package_version="${{ github.event.inputs.package_version }}"
          if [ -z "$package_version" ]; then
            package_version="packages-24.10"
          fi

          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"

      - name: Download ipk files for x86_64 and aarch64_generic
        run: |
          set -euo pipefail

          FILE_PREFIXES=(
            "shadowsocks-libev-ss-server"
            "dns2tcp"
            "lua-neturl"
            "chinadns-ng"
            "dns2socks"
            "hysteria"
            "ipt2socks"
            "microsocks"
            "mosdns"
            "naiveproxy"
            "redsocks2"
            "shadowsocksr-libev"
            "shadowsocks-rust"
            "shadow-tls"
            "simple-obfs-client"
            "tcping"
            "trojan"
            "tuic-client"
            "v2ray-plugin"
            "xray-core"
            "luci-app-ssr-plus"
          )

          EXCLUDE_PREFIXES=(
            "luci-app-chinadns-ng"
            "luci-app-microsocks"
            "luci-app-mosdns"
            "luci-app-naiveproxy"
            "luci-app-redsocks2"
            "luci-app-shadowsocks"
          )

          download_from_dir() {
            local base_url="$1"
            local out_dir="$2"

            echo "Fetching directory page from $base_url"

            wget -qO- "$base_url" | while IFS= read -r line; do
              for prefix in "${FILE_PREFIXES[@]}"; do
                if [[ "$line" == *"$prefix"* ]]; then
                  file=$(echo "$line" | grep -oP 'href="\K[^"]*' || true)
                  if [[ -z "${file:-}" ]]; then
                    continue
                  fi

                  exclude_file=false
                  for exclude_prefix in "${EXCLUDE_PREFIXES[@]}"; do
                    if [[ "$file" == $exclude_prefix* ]]; then
                      exclude_file=true
                      break
                    fi
                  done

                  if $exclude_file; then
                    echo "Skip file: $file"
                    continue
                  fi

                  file_url="${base_url}${file}"
                  echo "Downloading: $file_url"
                  curl -L --fail --retry 5 --retry-delay 3 --connect-timeout 20 \
                    "$file_url" -o "${out_dir}/$(basename "$file_url")"
                fi
              done
            done
          }

          BASE_URL_X86="https://dl.openwrt.ai/${PACKAGE_VERSION}/x86_64/kiddin9/"
          BASE_URL_ARM="https://dl.openwrt.ai/${PACKAGE_VERSION}/aarch64_generic/kiddin9/"

          download_from_dir "$BASE_URL_X86" "x86_64/depends"
          download_from_dir "$BASE_URL_ARM" "aarch64_generic/depends"

      - name: Download libudns ipk
        run: |
          set -euo pipefail

          FILE_PREFIXES=("libudns")

          download_from_packages_dir() {
            local base_url="$1"
            local out_dir="$2"

            wget -qO- "$base_url" | while IFS= read -r line; do
              for prefix in "${FILE_PREFIXES[@]}"; do
                if [[ "$line" == *"$prefix"* ]]; then
                  file=$(echo "$line" | grep -oP 'href="\K[^"]*' || true)
                  if [[ -z "${file:-}" ]]; then
                    continue
                  fi

                  file_url="${base_url}${file}"
                  echo "Downloading: $file_url"
                  curl -L --fail --retry 5 --retry-delay 3 --connect-timeout 20 \
                    "$file_url" -o "${out_dir}/$(basename "$file_url")"
                fi
              done
            done
          }

          BASE_URL_X86="https://dl.openwrt.ai/${PACKAGE_VERSION}/x86_64/packages/"
          BASE_URL_ARM="https://dl.openwrt.ai/${PACKAGE_VERSION}/aarch64_generic/packages/"

          download_from_packages_dir "$BASE_URL_X86" "x86_64/depends"
          download_from_packages_dir "$BASE_URL_ARM" "aarch64_generic/depends"

      - name: List depends ipks
        run: |
          set -euo pipefail

          echo "List x86 depends ipk files"
          rm -f x86_64/depends/luci-app-trojan-server* || true
          ls -lh x86_64/depends/

          echo "List aarch64_generic depends ipk files"
          rm -f aarch64_generic/depends/luci-app-trojan-server* || true
          ls -lh aarch64_generic/depends/

          mv x86_64/depends/luci-app-ssr-plus*.ipk x86_64/
          mv aarch64_generic/depends/luci-app-ssr-plus*.ipk aarch64_generic/

          echo "查看 aarch64_generic 目录"
          ls -lah aarch64_generic/
          echo "查看 x86_64 目录"
          ls -lah x86_64/

      - name: Parse version from filename
        run: |
          set -euo pipefail

          for file in aarch64_generic/luci-app-ssr-plus*.ipk; do
            base=${file##*/}
            tmp=${base#*_}
            tmp=${tmp%_all.ipk}
            version=${tmp/-/_}
            echo "ssrp_version=$version" >> "$GITHUB_ENV"
            echo "版本号是：$version"
            break
          done

      - name: Create install.sh
        run: |
          set -euo pipefail

          cat > x86_64/install.sh <<'EOF'
          #!/bin/sh

          opkg update
          if [ $? -ne 0 ]; then
            echo "update failed"
            exit 1
          fi

          opkg install depends/*.ipk --force-depends
          opkg install *.ipk --force-depends
          EOF

          chmod +x x86_64/install.sh
          cp x86_64/install.sh aarch64_generic/install.sh

      - name: Clone makeself repo
        run: |
          set -euo pipefail
          git clone https://github.com/megastep/makeself.git

      - name: Move package folders into makeself
        run: |
          set -euo pipefail
          mv -f x86_64/ makeself/
          mv -f aarch64_generic/ makeself/
          ls -lah makeself/

      - name: Create self-extracting archives
        run: |
          set -euo pipefail

          cd makeself
          ./makeself.sh x86_64/ ssrp_x86_64-${ssrp_version}.run "by github action" ./install.sh
          ./makeself.sh aarch64_generic/ ssrp_aarch64_generic-${ssrp_version}.run "by github action" ./install.sh

      - name: Upload all .run files to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "ShadowsocksPlusPlus"
          name: SSRP-${{ env.ssrp_version }}
          files: makeself/*.run
          token: ${{ secrets.GITHUB_TOKEN }}
